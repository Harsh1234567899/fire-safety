    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      /* Native Date Input Styling */
      input[type="date"] {
        position: relative;
        padding-right: 40px; /* Space for the custom icon if needed, or browser icon */
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator {
        position: absolute;
        right: 12px;
        top: 0;
        bottom: 0;
        width: 20px;
        height: auto;
        opacity: 0;
        cursor: pointer;
        z-index: 10;
      }
      
      input[type="date"]::-webkit-datetime-edit-fields-wrapper {
        padding: 0;
      }

      /* Fix for certificate printing */
      @media print {
        #certificate-print-area {
          margin: 0 !important;
          padding: 0 !important;
          box-shadow: none !important;
        }
      }
    </style>
